services:
  backend:
    build: ./backend
    container_name: jscc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost,http://localhost:8080}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: jscc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
